<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <title>Evanessia</title>

  <script type="importmap">
  {
    "imports": {
      "three":          "https://cdn.jsdelivr.net/npm/three@0.165.0/build/three.module.min.js",
      "three/addons/":  "https://cdn.jsdelivr.net/npm/three@0.165.0/examples/jsm/",
      "@pixiv/three-vrm": "https://cdn.jsdelivr.net/npm/@pixiv/three-vrm@2.1.2/lib/three-vrm.module.min.js"
    }
  }
  </script>

  <style>
    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

    :root {
      --bg:           #07070f;
      --surface:      #0e0d1e;
      --border:       #1e1a3a;
      --accent:       #7c5cbf;
      --accent-light: #c4b8f0;
      --text:         #dddaf5;
      --muted:        #6a6490;
    }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: 'Segoe UI', system-ui, sans-serif;
      height: 100dvh;
      display: flex;
      flex-direction: column;
      align-items: center;
      overflow: hidden;
    }

    header {
      padding: 0.85rem 0 0.1rem;
      text-align: center;
      flex-shrink: 0;
    }

    h1 {
      font-size: clamp(1.15rem, 3.8vw, 1.7rem);
      font-weight: 300;
      letter-spacing: 0.35em;
      color: var(--accent-light);
      text-transform: uppercase;
    }

    .subtitle {
      font-size: 0.65rem;
      letter-spacing: 0.2em;
      color: var(--muted);
      margin-top: 0.1rem;
    }

    /* ── Avatar section ── */
    .avatar-section {
      display: flex;
      flex-direction: column;
      align-items: center;
      flex-shrink: 0;
      margin: 0.55rem 0 0.85rem;
    }

    /* Portrait arch shape */
    .char-wrap {
      position: relative;
      width:  clamp(126px, 32vw, 158px);
      height: clamp(160px, 41vw, 200px);
      border-radius: 50% 50% 46% 46% / 36% 36% 56% 56%;
      overflow: hidden;
      background: radial-gradient(ellipse at 38% 28%, #1c0f3e, #07070f 82%);
      box-shadow: 0 0 0 1px #2a1a5e, 0 0 24px #5b3fa01a;
      transition: box-shadow 0.35s;
      cursor: pointer;
    }
    .char-wrap.listening { box-shadow: 0 0 0 2px #9b7de0bb, 0 0 32px #7c5cbf55; }
    .char-wrap.speaking  { box-shadow: 0 0 0 2px #bf80c8bb, 0 0 32px #bf7dc044; }
    .char-wrap.thinking  { box-shadow: 0 0 0 1px #5a4a80,   0 0 18px #3a2a6022; }
    .char-wrap.standby   { opacity: 0.72; box-shadow: 0 0 0 1px #1e1a3a; }

    /* VRM canvas covers the arch — Three.js sets its pixel dimensions */
    #vrmCanvas {
      position: absolute;
      top: 0; left: 0;
      opacity: 0;
      transition: opacity 0.9s;
      z-index: 1;
    }

    /* Fallback orb while VRM loads or if it fails */
    .orb-fallback {
      position: absolute;
      inset: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      z-index: 0;
    }

    .orb-fx {
      position: relative;
      width: 70px;
      height: 70px;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .ring {
      position: absolute;
      inset: 0;
      border-radius: 50%;
      border: 1px solid #7c5cbf44;
    }

    .orb-core {
      position: relative;
      z-index: 1;
      width: 70px;
      height: 70px;
      border-radius: 50%;
      background: radial-gradient(circle at 35% 35%, #7c5cbf, #2a1a5e 70%);
      box-shadow: 0 0 28px #5b3fa044;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: box-shadow 0.3s, background 0.3s, opacity 0.3s;
    }
    .orb-core svg { width: 26px; height: 26px; fill: var(--accent-light); opacity: 0.85; }

    /* Orb states driven by charWrap class */
    .char-wrap.standby .orb-core  { opacity: 0.5; box-shadow: 0 0 12px #2a1a5022; }
    .char-wrap.standby .ring      { animation: pulse 3.5s ease-out infinite; opacity: 0.25; }
    .char-wrap.standby .ring:nth-child(2) { animation-delay: 1.15s; }
    .char-wrap.standby .ring:nth-child(3) { animation-delay: 2.3s; }

    .char-wrap.listening .orb-core { box-shadow: 0 0 48px #a07de0bb; background: radial-gradient(circle at 35% 35%, #9b7de0, #3a1f7e 70%); }
    .char-wrap.listening .ring     { animation: pulse 1.5s ease-out infinite; }
    .char-wrap.listening .ring:nth-child(2) { animation-delay: 0.4s; }
    .char-wrap.listening .ring:nth-child(3) { animation-delay: 0.8s; }

    .char-wrap.speaking .orb-core  { box-shadow: 0 0 48px #bf80c8bb; background: radial-gradient(circle at 35% 35%, #bf7de0, #5a1a7e 70%); }
    .char-wrap.speaking .ring      { animation: pulse 2s ease-out infinite; border-color: #bf7dc044; }
    .char-wrap.speaking .ring:nth-child(2) { animation-delay: 0.5s; }
    .char-wrap.speaking .ring:nth-child(3) { animation-delay: 1s; }

    @keyframes pulse {
      0%   { transform: scale(1);   opacity: 0.65; }
      100% { transform: scale(2);   opacity: 0; }
    }

    /* ── Mic button — overlaps bottom of arch by 14px ── */
    .mic-btn {
      margin-top: -14px;
      width: 40px;
      height: 40px;
      border-radius: 50%;
      background: var(--accent);
      border: 2.5px solid var(--bg);
      box-shadow: 0 2px 14px #5b3fa055;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
      transition: background 0.2s, transform 0.15s, box-shadow 0.2s;
      z-index: 2;
    }
    .mic-btn:hover      { background: #9b7de0; transform: scale(1.08); }
    .mic-btn.listening  { background: #a07de0; animation: mic-glow 1.2s ease-in-out infinite; }
    .mic-btn.speaking   { background: #3a2e6e; cursor: default; }
    .mic-btn.standby    { background: #3a2e6e; }
    .mic-btn svg { width: 17px; height: 17px; fill: white; }

    @keyframes mic-glow {
      0%, 100% { box-shadow: 0 2px 14px #5b3fa055; }
      50%       { box-shadow: 0 2px 24px #a07de0aa; }
    }

    /* ── Status ── */
    .status {
      font-size: 0.7rem;
      letter-spacing: 0.12em;
      color: var(--muted);
      height: 1.1em;
      margin-bottom: 0.45rem;
      transition: color 0.3s;
      flex-shrink: 0;
    }
    .status.active { color: var(--accent-light); }

    /* ── Controls ── */
    .controls {
      display: flex;
      gap: 0.6rem;
      margin-bottom: 0.45rem;
      flex-shrink: 0;
    }

    .ctrl-btn {
      background: none;
      border: 1px solid var(--border);
      color: var(--muted);
      border-radius: 20px;
      padding: 0.26rem 0.75rem;
      font-size: 0.67rem;
      letter-spacing: 0.07em;
      cursor: pointer;
      transition: border-color 0.2s, color 0.2s, background 0.2s;
      white-space: nowrap;
    }
    .ctrl-btn:hover { border-color: var(--accent); color: var(--accent-light); }
    .ctrl-btn.on    { border-color: var(--accent); color: var(--accent-light); background: #1a0e3a; }

    /* ── Bubbles ── */
    .bubble-wrap {
      width: min(560px, 92vw);
      flex: 1;
      overflow-y: auto;
      display: flex;
      flex-direction: column;
      gap: 0.55rem;
      padding: 0.2rem 0.2rem 0.4rem;
    }
    .bubble-wrap::-webkit-scrollbar { width: 3px; }
    .bubble-wrap::-webkit-scrollbar-thumb { background: #3a3060; border-radius: 2px; }

    .bubble {
      padding: 0.6rem 0.95rem;
      border-radius: 14px;
      font-size: 0.875rem;
      line-height: 1.55;
      max-width: 86%;
      animation: fadeUp 0.25s ease;
    }
    .bubble.user {
      align-self: flex-end;
      background: #1e1650;
      color: var(--accent-light);
      border-bottom-right-radius: 4px;
    }
    .bubble.assistant {
      align-self: flex-start;
      background: var(--surface);
      color: var(--text);
      border: 1px solid var(--border);
      border-bottom-left-radius: 4px;
    }

    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(6px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    /* ── Text input ── */
    .input-row {
      width: min(560px, 92vw);
      display: flex;
      gap: 0.5rem;
      padding: 0.6rem 0;
      flex-shrink: 0;
      border-top: 1px solid var(--border);
    }

    .text-input {
      flex: 1;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 22px;
      padding: 0.52rem 1rem;
      color: var(--text);
      font-size: 0.875rem;
      font-family: inherit;
      outline: none;
      transition: border-color 0.2s;
    }
    .text-input:focus { border-color: var(--accent); }
    .text-input::placeholder { color: var(--muted); }

    .send-btn {
      background: var(--accent);
      border: none;
      border-radius: 50%;
      width: 38px;
      height: 38px;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
      transition: background 0.2s, transform 0.15s;
    }
    .send-btn:hover { background: #9b7de0; transform: scale(1.05); }
    .send-btn svg { width: 17px; height: 17px; fill: white; }
  </style>
</head>
<body>

<header>
  <h1>Evanessia</h1>
  <p class="subtitle">голосовой ассистент</p>
</header>

<div class="avatar-section">
  <div class="char-wrap" id="charWrap">
    <canvas id="vrmCanvas"></canvas>
    <div class="orb-fallback" id="orbFallback">
      <div class="orb-fx">
        <div class="ring"></div>
        <div class="ring"></div>
        <div class="ring"></div>
        <div class="orb-core">
          <svg viewBox="0 0 24 24"><path d="M12 14a3 3 0 0 0 3-3V5a3 3 0 0 0-6 0v6a3 3 0 0 0 3 3zm5-3a5 5 0 0 1-10 0H5a7 7 0 0 0 6 6.93V20H9v2h6v-2h-2v-2.07A7 7 0 0 0 19 11h-2z"/></svg>
        </div>
      </div>
    </div>
  </div>
  <button class="mic-btn" id="micBtn" title="Нажми чтобы говорить">
    <svg viewBox="0 0 24 24"><path d="M12 14a3 3 0 0 0 3-3V5a3 3 0 0 0-6 0v6a3 3 0 0 0 3 3zm5-3a5 5 0 0 1-10 0H5a7 7 0 0 0 6 6.93V20H9v2h6v-2h-2v-2.07A7 7 0 0 0 19 11h-2z"/></svg>
  </button>

<div class="status" id="status">нажмите микрофон</div>

<div class="input-row">

    <svg viewBox="0 0 24 24"><path d="M2.01 21 23 12 2.01 3 2 10l15 2-15 2z"/></svg>

<!-- VRM character renderer -->
<script type="module">
  import * as THREE from 'three';
  import { GLTFLoader } from 'three/addons/loaders/GLTFLoader.js';
  import { VRMLoaderPlugin, VRMUtils } from '@pixiv/three-vrm';

  const canvas      = document.getElementById('vrmCanvas');
  const charWrap    = document.getElementById('charWrap');
  const orbFallback = document.getElementById('orbFallback');

  const W = charWrap.clientWidth  || 158;
  const H = charWrap.clientHeight || 200;

  const renderer = new THREE.WebGLRenderer({ canvas, alpha: true, antialias: true });
  renderer.setSize(W, H);
  renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
  renderer.outputColorSpace = THREE.SRGBColorSpace;

  const scene  = new THREE.Scene();
  const camera = new THREE.PerspectiveCamera(28, W / H, 0.01, 20);
  // Portrait framing: face + upper chest of a ~1.6 m VRoid character
  camera.position.set(0, 1.46, 0.68);
  camera.lookAt(0, 1.52, 0);

  // Warm front key + cool rim
  scene.add(new THREE.AmbientLight(0x9988dd, 0.65));
  const key = new THREE.DirectionalLight(0xd2ccff, 1.25);
  key.position.set(0.4, 2.5, 2);
  scene.add(key);
  const rim = new THREE.DirectionalLight(0x7c5cbf, 0.45);
  rim.position.set(-2, 1.5, -1);
  scene.add(rim);

  let vrm    = null;
  let evaState = 'idle';
  const clock  = new THREE.Clock();

  // Per-frame animation state
  let breathT      = 0;
  let blinkTimer   = 2;
  let blinkInterval = 3 + Math.random() * 2;
  let blinkVal     = 0;   // 0 = open, 1 = closed
  let blinkDir     = 0;   // 0 = idle, 1 = closing, -1 = opening
  let mouthPhase   = 0;
  let headTiltCur  = 0, headTiltTgt = 0;
  let headNodCur   = 0, headNodTgt  = 0;

  function lerp(a, b, t) { return a + (b - a) * t; }

  function setExpr(name, w) {
    if (!vrm?.expressionManager) return;
    try { vrm.expressionManager.setValue(name, Math.max(0, Math.min(1, w))); } catch {}
  }

  // Load VRM model (place your file as /character.vrm in the project root)
  const loader = new GLTFLoader();
  loader.register(parser => new VRMLoaderPlugin(parser));

  loader.load('./character.vrm',
    gltf => {
      vrm = gltf.userData.vrm;
      try { VRMUtils.removeUnnecessaryJoints(vrm.scene); } catch {}
      scene.add(vrm.scene);
      canvas.style.opacity = '1';
    },
    undefined,
    () => {
      // Model not found — keep fallback orb visible
      canvas.style.display = 'none';
    }
  );

  // React to app states broadcast by the main script
  window.addEventListener('eva-state', e => {
    evaState = e.detail;
    headTiltTgt = evaState === 'listening' ? 0.07 : 0;
    headNodTgt  = evaState === 'thinking'  ? 0.05 : 0;
    if (evaState !== 'speaking') { mouthPhase = 0; setExpr('aa', 0); }
  });

  // Main render loop
  (function animate() {
    requestAnimationFrame(animate);
    if (!vrm) return;

    const dt = clock.getDelta();
    const t  = clock.elapsedTime;

    // Breath — chest rises gently
    breathT += dt * (evaState === 'speaking' ? 1.7 : 0.85);
    const chest = vrm.humanoid.getRawBoneNode('upperChest')
               || vrm.humanoid.getRawBoneNode('chest')
               || vrm.humanoid.getRawBoneNode('spine');
    if (chest) chest.rotation.x = Math.sin(breathT) * 0.009;

    // Head pose
    headTiltCur = lerp(headTiltCur, headTiltTgt, dt * 3.5);
    const nodOsc = evaState === 'thinking' ? Math.sin(t * 1.9) * 0.035 : 0;
    headNodCur   = lerp(headNodCur, headNodTgt + nodOsc, dt * 4);
    const head   = vrm.humanoid.getRawBoneNode('head');
    if (head) { head.rotation.z = headTiltCur; head.rotation.x = headNodCur; }

    // Blink
    blinkTimer -= dt;
    if (blinkTimer <= 0 && blinkDir === 0) {
      blinkDir      = 1;
      blinkTimer    = blinkInterval;
      blinkInterval = 2 + Math.random() * 3.5;
    }
    if (blinkDir === 1) {
      blinkVal += dt * 18;
      if (blinkVal >= 1) { blinkVal = 1; blinkDir = -1; }
    } else if (blinkDir === -1) {
      blinkVal -= dt * 12;
      if (blinkVal <= 0) { blinkVal = 0; blinkDir = 0; }
    }
    setExpr('blink', blinkVal);

    // Mouth during speech
    if (evaState === 'speaking') {
      mouthPhase += dt * 7.5;
      setExpr('aa', Math.abs(Math.sin(mouthPhase)) * 0.6);
    }

    vrm.update(dt);
    renderer.render(scene, camera);
  })();

  // Keep renderer in sync with charWrap size on resize
  window.addEventListener('resize', () => {
    const w = charWrap.clientWidth  || 158;
    const h = charWrap.clientHeight || 200;
    camera.aspect = w / h;
    camera.updateProjectionMatrix();
    renderer.setSize(w, h);
  });
</script>

<script>
  const charWrap  = document.getElementById('charWrap');
  const micBtn    = document.getElementById('micBtn');
  const statusEl  = document.getElementById('status');
  const bubblesEl = document.getElementById('bubbles');
  const wakeBtn   = document.getElementById('wakeBtn');
  const clearBtn  = document.getElementById('clearBtn');
  const textInput = document.getElementById('textInput');
  const sendBtn   = document.getElementById('sendBtn');

  const STORAGE_KEY = 'evanessia_history';
  const MAX_SAVED   = 40;
  const WAKE_WORDS  = ['эва', 'ева', 'eva', 'эванессия', 'эванессиа', 'evanessia'];

  const SYSTEM_MSG = {
    role: 'system',
    content: 'Ты — Evanessia, умный голосовой ассистент. Отвечай кратко, дружелюбно и по-русски. Избегай длинных перечислений — говори живым языком, как в разговоре.'
  };

  // ── State ────────────────────────────────────────────────────────────────────
  let wakeMode      = false;
  let awaitingQuery = false;
  let isSpeaking    = false;
  let convTimer     = null;
  let recTimer      = null;
  let emptyCount    = 0;

  // Broadcast visual state to both the orb-fallback CSS and the VRM module
  function setCharState(s) {
    charWrap.className = 'char-wrap' + (s ? ' ' + s : '');
    micBtn.className   = 'mic-btn'   + (s ? ' ' + s : '');
    window.dispatchEvent(new CustomEvent('eva-state', { detail: s || 'idle' }));
  }

  // ── History ─────────────────────────────────────────────────────────────────
  let history = [SYSTEM_MSG];

  function loadHistory() {
    try {
      const saved = JSON.parse(localStorage.getItem(STORAGE_KEY) || '[]');
      if (saved.length) {
        history = [SYSTEM_MSG, ...saved];
        saved.forEach(m => addBubble(m.role, m.content, false));
        bubblesEl.scrollTop = bubblesEl.scrollHeight;
      }
    } catch {}
  }

  function saveHistory() {
    const msgs = history.filter(m => m.role !== 'system').slice(-MAX_SAVED);
    localStorage.setItem(STORAGE_KEY, JSON.stringify(msgs));
  }

  function clearHistory() {
    if (!confirm('Очистить историю разговора?')) return;
    history = [SYSTEM_MSG];
    localStorage.removeItem(STORAGE_KEY);
    bubblesEl.innerHTML = '';
  }

  // ── MediaRecorder → Whisper ──────────────────────────────────────────────────
  let isRecording   = false;
  let mediaRecorder = null;
  let audioChunks   = [];
  let micStream     = null;

  async function getMic() {
    if (!micStream) micStream = await navigator.mediaDevices.getUserMedia({ audio: true });
    return micStream;
  }

  async function startRecording() {
    try {
      const stream = await getMic();
      audioChunks  = [];
      const mime   = MediaRecorder.isTypeSupported('audio/webm;codecs=opus')
                     ? 'audio/webm;codecs=opus' : 'audio/webm';
      mediaRecorder = new MediaRecorder(stream, { mimeType: mime });
      mediaRecorder.ondataavailable = e => { if (e.data.size > 0) audioChunks.push(e.data); };
      mediaRecorder.onstop = onRecordingStop;
      mediaRecorder.start();
      isRecording = true;
      setCharState('listening');
      setStatus('запись…', true);
    } catch {
      setStatus('нет доступа к микрофону', false);
    }
  }

  function stopRecording() {
    if (!mediaRecorder || mediaRecorder.state !== 'recording') return;
    clearTimeout(recTimer);
    isRecording = false;
    mediaRecorder.stop();
    setCharState('thinking');
    setStatus('распознаю…', true);
  }

  async function onRecordingStop() {
    const blob   = new Blob(audioChunks, { type: mediaRecorder.mimeType });
    const base64 = await new Promise(resolve => {
      const reader = new FileReader();
      reader.onload = () => resolve(reader.result.split(',')[1]);
      reader.readAsDataURL(blob);
    });

    try {
      const res  = await fetch('/whisper', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ audio: base64, mimeType: mediaRecorder.mimeType }),
      });
      const data = await res.json();
      const text = (data.text || '').trim();

      if (text.length > 1) {
        emptyCount = 0;
        addBubble('user', text);
        await sendToGroq(text);
      } else {
        emptyCount++;
        if (awaitingQuery && emptyCount < 2) {
          setStatus('не расслышала…', true);
          startConversation();
        } else {
          emptyCount = 0;
          endConversation();
        }
      }
    } catch {
      setStatus('ошибка распознавания', false);
      endConversation();
    }
  }

  // ── Mic button ───────────────────────────────────────────────────────────────
  micBtn.addEventListener('click', () => {
    if (wakeMode && !awaitingQuery) return;
    if (isRecording) {
      clearTimeout(recTimer);
      stopRecording();
    } else if (!isSpeaking) {
      startRecording();
    }
  });
  // Clicking portrait also triggers mic
  charWrap.addEventListener('click', () => micBtn.click());

  // ── Conversation mode ────────────────────────────────────────────────────────
  function startConversation() {
    awaitingQuery = true;
    clearTimeout(convTimer);
    clearTimeout(recTimer);
    startRecording();
    recTimer  = setTimeout(() => { if (isRecording) stopRecording(); }, 8000);
    convTimer = setTimeout(endConversation, 30000);
  }

  function endConversation() {
    awaitingQuery = false;
    emptyCount    = 0;
    clearTimeout(convTimer);
    clearTimeout(recTimer);
    if (isRecording) stopRecording();
    if (wakeMode) {
      setCharState('standby');
      setStatus('жду «Эва»…', false);
      startWakeListening();
    } else {
      setCharState('');
      setStatus('нажмите микрофон', false);
    }
  }

  // ── Wake word (Web Speech API) ────────────────────────────────────────────────
  const SpeechRec   = window.SpeechRecognition || window.webkitSpeechRecognition;
  const recognition = SpeechRec ? new SpeechRec() : null;
  let isListening   = false;

  if (recognition) {
    recognition.lang            = 'ru-RU';
    recognition.continuous      = false;
    recognition.interimResults  = false;
    recognition.maxAlternatives = 1;
  }

  function startWakeListening() {
    if (!recognition || !wakeMode || awaitingQuery || isRecording || isListening) return;
    try { recognition.start(); } catch {}
  }

  if (recognition) {
    recognition.onstart = () => { isListening = true; };
    recognition.onend   = () => {
      isListening = false;
      if (wakeMode && !awaitingQuery && !isRecording) setTimeout(startWakeListening, 100);
    };
    recognition.onerror = () => {
      isListening = false;
      if (wakeMode && !awaitingQuery && !isRecording) setTimeout(startWakeListening, 600);
    };
    recognition.onresult = async (e) => {
      const text      = e.results[e.resultIndex][0].transcript.trim();
      const lower     = text.toLowerCase();
      const wakeFound = WAKE_WORDS.find(w => lower.includes(w));
      if (!wakeFound) return;
      const idx   = lower.indexOf(wakeFound);
      const query = text.slice(idx + wakeFound.length).trim();
      if (query.length > 1) {
        addBubble('user', query);
        await sendToGroq(query);
      } else {
        setTimeout(startConversation, 300);
      }
    };
  }

  // ── Wake word toggle ──────────────────────────────────────────────────────────
  wakeBtn.addEventListener('click', () => {
    wakeMode = !wakeMode;
    wakeBtn.classList.toggle('on', wakeMode);
    wakeBtn.textContent = wakeMode ? '● слово-пробуждение' : '⌀ слово-пробуждение';

    if (wakeMode) {
      setCharState('standby');
      setStatus('жду «Эва»…', false);
      startWakeListening();
    } else {
      if (recognition) try { recognition.stop(); } catch {}
      if (isRecording) stopRecording();
      setCharState('');
      setStatus('нажмите микрофон', false);
    }
  });

  clearBtn.addEventListener('click', clearHistory);

  // ── Groq API ──────────────────────────────────────────────────────────────────
  async function sendToGroq(userText) {
    history.push({ role: 'user', content: userText });
    setCharState('thinking');
    setStatus('думаю…', true);

    try {
      const res   = await fetch('/chat', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ messages: history }),
      });
      const data  = await res.json();
      const reply = data.choices?.[0]?.message?.content ?? 'Не получила ответ.';
      history.push({ role: 'assistant', content: reply });
      saveHistory();
      addBubble('assistant', reply);
      speak(reply);
    } catch {
      setCharState(wakeMode ? 'standby' : '');
      setStatus(wakeMode ? 'жду «Эва»…' : 'ошибка соединения', false);
    }
  }

  // ── Text input ────────────────────────────────────────────────────────────────
  async function handleTextSend() {
    const text = textInput.value.trim();
    if (!text) return;
    textInput.value = '';
    addBubble('user', text);
    await sendToGroq(text);
  }

  sendBtn.addEventListener('click', handleTextSend);
  textInput.addEventListener('keydown', e => {
    if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); handleTextSend(); }
  });

  // ── TTS ───────────────────────────────────────────────────────────────────────
  let voices = [];
  const loadVoices = () => { voices = speechSynthesis.getVoices(); };
  loadVoices();
  speechSynthesis.addEventListener('voiceschanged', loadVoices);

  function pickVoice() {
    const ruFemale = voices.find(v => v.lang.startsWith('ru') && /female|irina|tatyana|milena|svetlana/i.test(v.name));
    return ruFemale || voices.find(v => v.lang.startsWith('ru')) || voices[0] || null;
  }

  function speak(text) {
    speechSynthesis.cancel();
    const utt  = new SpeechSynthesisUtterance(text);
    utt.lang   = 'ru-RU';
    utt.rate   = 1.0;
    utt.pitch  = 1.1;
    const v    = pickVoice();
    if (v) utt.voice = v;

    utt.onstart = () => {
      isSpeaking = true;
      setCharState('speaking');
      setStatus('говорю…', true);
    };
    utt.onend = () => {
      isSpeaking = false;
      if (wakeMode) {
        setCharState('standby');
        setTimeout(startConversation, 300);
      } else {
        setCharState('');
        setStatus('нажмите микрофон', false);
      }
    };

    speechSynthesis.speak(utt);
  }

  // ── Helpers ───────────────────────────────────────────────────────────────────
  function setStatus(text, active) {
    statusEl.textContent = text;
    statusEl.className   = 'status' + (active ? ' active' : '');
  }

  function addBubble(role, text, animate = true) {
    const div = document.createElement('div');
    div.className = `bubble ${role}`;
    if (!animate) div.style.animation = 'none';
    div.textContent = text;
    bubblesEl.appendChild(div);
    bubblesEl.scrollTop = bubblesEl.scrollHeight;
  }

  loadHistory();
</script>
</body>
</html>
