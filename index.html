<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <title>Evanessia</title>

  <script type="importmap">
  {
    "imports": {
      "three":                      "https://cdn.jsdelivr.net/npm/three@0.165.0/build/three.module.min.js",
      "three/addons/":              "https://cdn.jsdelivr.net/npm/three@0.165.0/examples/jsm/",
      "@pixiv/three-vrm":           "https://cdn.jsdelivr.net/npm/@pixiv/three-vrm@2.1.2/lib/three-vrm.module.min.js",
      "@pixiv/three-vrm-animation": "https://cdn.jsdelivr.net/npm/@pixiv/three-vrm-animation@2.1.2/lib/three-vrm-animation.module.min.js"
    }
  }
  </script>

  <script src="https://cdn.jsdelivr.net/npm/marked@9/marked.min.js"></script>
  <link  id="hlTheme" rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/styles/atom-one-dark.min.css">
  <script src="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/highlight.min.js"></script>

  <style>
    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

    :root {
      --bg:           #07070f;
      --surface:      #0e0d1e;
      --border:       #1e1a3a;
      --accent:       #7c5cbf;
      --accent-light: #c4b8f0;
      --text:         #dddaf5;
      --muted:        #6a6490;
    }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: 'Segoe UI', system-ui, sans-serif;
      height: 100dvh;
      display: flex;
      flex-direction: row;
      overflow: hidden;
    }

    /* ── Chat column (left) ── */
    .chat-col {
      flex: 1;
      min-width: 0;
      display: flex;
      flex-direction: column;
      align-items: center;
      overflow: hidden;
      padding-left: clamp(1rem, 35%, 480px);
      padding-right: clamp(0.5rem, 6%, 80px);
    }

    header {
      padding: 1rem 0 0.15rem;
      text-align: center;
      flex-shrink: 0;
    }

    h1 {
      font-size: clamp(1.1rem, 2.8vw, 1.7rem);
      font-weight: 300;
      letter-spacing: 0.35em;
      color: var(--accent-light);
      text-transform: uppercase;
    }

    .subtitle {
      font-size: 0.65rem;
      letter-spacing: 0.2em;
      color: var(--muted);
      margin-top: 0.1rem;
    }

    .status {
      font-size: 0.7rem;
      letter-spacing: 0.12em;
      color: var(--muted);
      height: 1.1em;
      margin: 0.4rem 0 0.3rem;
      transition: color 0.3s;
      flex-shrink: 0;
    }
    .status.active { color: var(--accent-light); }

    .controls {
      display: flex;
      gap: 0.5rem;
      margin-bottom: 0.4rem;
      flex-shrink: 0;
    }

    .ctrl-btn {
      background: none;
      border: 1px solid var(--border);
      color: var(--muted);
      border-radius: 20px;
      padding: 0.24rem 0.7rem;
      font-size: 0.66rem;
      letter-spacing: 0.07em;
      cursor: pointer;
      transition: border-color 0.2s, color 0.2s, background 0.2s;
      white-space: nowrap;
    }
    .ctrl-btn:hover { border-color: var(--accent); color: var(--accent-light); }
    .ctrl-btn.on    { border-color: var(--accent); color: var(--accent-light); background: #1a0e3a; }

    /* ── Bubbles ── */
    .bubble-wrap {
      width: 96%;
      flex: 1;
      overflow-y: auto;
      display: flex;
      flex-direction: column;
      gap: 0.55rem;
      padding: 0.2rem 0.2rem 0.4rem;
    }
    .bubble-wrap::-webkit-scrollbar { width: 3px; }
    .bubble-wrap::-webkit-scrollbar-thumb { background: #3a3060; border-radius: 2px; }

    .bubble {
      padding: 0.6rem 0.95rem;
      border-radius: 14px;
      font-size: 0.875rem;
      line-height: 1.55;
      max-width: 86%;
      animation: fadeUp 0.25s ease;
    }
    .bubble.user {
      align-self: flex-end;
      background: #1e1650;
      color: var(--accent-light);
      border-bottom-right-radius: 4px;
    }
    .bubble.assistant {
      align-self: flex-start;
      background: var(--surface);
      color: var(--text);
      border: 1px solid var(--border);
      border-bottom-left-radius: 4px;
      position: relative;
      padding-bottom: 1.4rem;
    }

    .bubble-replay {
      position: absolute;
      bottom: 0.3rem;
      right: 0.45rem;
      background: none;
      border: none;
      cursor: pointer;
      padding: 2px;
      opacity: 0;
      transition: opacity 0.18s;
      line-height: 0;
    }
    .bubble-replay svg { width: 13px; height: 13px; fill: var(--accent-light); display: block; }
    .bubble.assistant:hover .bubble-replay { opacity: 0.5; }
    .bubble-replay:hover { opacity: 1 !important; }

    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(6px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    /* ── Input row ── */
    .input-row {
      width: 96%;
      display: flex;
      gap: 0.45rem;
      align-items: center;
      padding: 0.55rem 0;
      flex-shrink: 0;
      border-top: 1px solid var(--border);
    }

    /* Mic button lives in the input row */
    .mic-btn {
      width: 38px;
      height: 38px;
      border-radius: 50%;
      background: var(--accent);
      border: none;
      box-shadow: 0 2px 10px #5b3fa044;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
      transition: background 0.2s, transform 0.15s, box-shadow 0.2s;
    }
    .mic-btn:hover     { background: #9b7de0; transform: scale(1.08); }
    .mic-btn.listening { background: #a07de0; animation: mic-glow 1.1s ease-in-out infinite; }
    .mic-btn.speaking  { background: #3a2e6e; cursor: default; }
    .mic-btn.standby   { background: #3a2e6e; }
    .mic-btn svg { width: 17px; height: 17px; fill: white; }

    @keyframes mic-glow {
      0%, 100% { box-shadow: 0 2px 10px #5b3fa044; }
      50%       { box-shadow: 0 2px 22px #a07de0aa; }
    }

    .text-input {
      flex: 1;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 22px;
      padding: 0.52rem 1rem;
      color: var(--text);
      font-size: 0.875rem;
      font-family: inherit;
      outline: none;
      transition: border-color 0.2s;
    }
    .text-input:focus { border-color: var(--accent); }
    .text-input::placeholder { color: var(--muted); }

    .send-btn {
      background: var(--accent);
      border: none;
      border-radius: 50%;
      width: 38px;
      height: 38px;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
      transition: background 0.2s, transform 0.15s;
    }
    .send-btn:hover { background: #9b7de0; transform: scale(1.05); }
    .send-btn svg { width: 17px; height: 17px; fill: white; }

    /* ── Character column (right) ── */
    .char-col {
      width: clamp(260px, 36vw, 460px);
      position: relative;
      flex-shrink: 0;
      background: radial-gradient(ellipse at 50% 65%, #110826, #07070f);
      border-left: 1px solid #1e1a3a33;
      transition: border-color 0.4s;
      overflow: hidden;
    }

    .char-col.listening { border-left-color: #9b7de044; box-shadow: inset -1px 0 40px #7c5cbf0a; }
    .char-col.speaking  { border-left-color: #bf80c844; box-shadow: inset -1px 0 40px #bf7dc00a; }

    /* Bottom gradient so feet blend into the floor */
    .char-col::after {
      content: '';
      position: absolute;
      bottom: 0; left: 0; right: 0;
      height: 80px;
      background: linear-gradient(to bottom, transparent, #07070f);
      pointer-events: none;
      z-index: 3;
    }

    #vrmCanvas {
      position: absolute;
      top: 0; left: 0;
      opacity: 0;
      transition: opacity 1s;
      z-index: 1;
    }

    /* Fallback orb centered in char-col */
    .orb-fallback {
      position: absolute;
      inset: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      z-index: 0;
    }

    .orb-fx {
      position: relative;
      width: 80px;
      height: 80px;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .ring {
      position: absolute;
      inset: 0;
      border-radius: 50%;
      border: 1px solid #7c5cbf44;
    }

    .orb-core {
      position: relative;
      z-index: 1;
      width: 80px;
      height: 80px;
      border-radius: 50%;
      background: radial-gradient(circle at 35% 35%, #7c5cbf, #2a1a5e 70%);
      box-shadow: 0 0 30px #5b3fa044;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: box-shadow 0.3s, background 0.3s, opacity 0.3s;
    }
    .orb-core svg { width: 30px; height: 30px; fill: var(--accent-light); opacity: 0.85; }

    .char-col.standby  .orb-core { opacity: 0.5; }
    .char-col.standby  .ring     { animation: pulse 3.5s ease-out infinite; opacity: 0.25; }
    .char-col.standby  .ring:nth-child(2) { animation-delay: 1.15s; }
    .char-col.standby  .ring:nth-child(3) { animation-delay: 2.3s; }

    .char-col.listening .orb-core { box-shadow: 0 0 55px #a07de0bb; background: radial-gradient(circle at 35% 35%, #9b7de0, #3a1f7e 70%); }
    .char-col.listening .ring     { animation: pulse 1.5s ease-out infinite; }
    .char-col.listening .ring:nth-child(2) { animation-delay: 0.4s; }
    .char-col.listening .ring:nth-child(3) { animation-delay: 0.8s; }

    .char-col.speaking  .orb-core { box-shadow: 0 0 55px #bf80c8bb; background: radial-gradient(circle at 35% 35%, #bf7de0, #5a1a7e 70%); }
    .char-col.speaking  .ring     { animation: pulse 2s ease-out infinite; border-color: #bf7dc044; }
    .char-col.speaking  .ring:nth-child(2) { animation-delay: 0.5s; }
    .char-col.speaking  .ring:nth-child(3) { animation-delay: 1s; }

    @keyframes pulse {
      0%   { transform: scale(1);   opacity: 0.65; }
      100% { transform: scale(2.2); opacity: 0; }
    }

    /* Model switcher overlay */
    .model-switcher {
      position: absolute;
      top: 0.75rem;
      left: 50%;
      transform: translateX(-50%);
      z-index: 10;
      white-space: nowrap;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 0.3rem;
    }
    .model-switcher select {
      background: #0e0d1ecc;
      border: 1px solid #2a1a5e;
      color: var(--accent-light);
      border-radius: 12px;
      padding: 0.22rem 0.55rem;
      font-size: 0.64rem;
      font-family: inherit;
      letter-spacing: 0.05em;
      cursor: pointer;
      backdrop-filter: blur(6px);
      outline: none;
      transition: border-color 0.2s;
    }
    .model-switcher select:hover { border-color: var(--accent); }

    /* On narrow screens hide character panel */
    /* ── Light (creamy) theme ── */
    :root[data-theme="light"] {
      --bg:           #f5f0e8;
      --surface:      #ede8dc;
      --border:       #d0c8b8;
      --accent:       #7c5cbf;
      --accent-light: #5a3a9e;
      --text:         #1e1a30;
      --muted:        #7a6e90;
    }
    [data-theme="light"] .bubble.user     { background: #dcd4f8; }
    [data-theme="light"] .ctrl-btn.on     { background: #e4dcf8; }
    [data-theme="light"] .bubble-wrap::-webkit-scrollbar-thumb { background: #c0b0d8; }
    [data-theme="light"] #vrmCanvas {
      filter: contrast(1.2) saturate(1.35);
    }
    [data-theme="light"] .char-col {
      background: radial-gradient(ellipse at 50% 65%, #c8b4e0, #e8e0f0);
      border-left-color: #d0c8b8;
    }
    [data-theme="light"] .char-col::after {
      background: linear-gradient(to bottom, transparent, #f5f0e8);
    }
    [data-theme="light"] .model-switcher select {
      background: rgba(245, 240, 232, 0.92);
      border-color: #c0b0d8;
      color: var(--accent-light);
    }

    /* ── Markdown rendering in assistant bubbles ── */
    .bubble.assistant p { margin: 0.25rem 0; }
    .bubble.assistant p:first-child { margin-top: 0; }
    .bubble.assistant p:last-child  { margin-bottom: 0; }
    .bubble.assistant ul, .bubble.assistant ol { padding-left: 1.4rem; margin: 0.25rem 0; }
    .bubble.assistant li { margin: 0.1rem 0; }
    .bubble.assistant pre {
      margin: 0.5rem 0;
      border-radius: 8px;
      border: 1px solid var(--border);
      overflow-x: auto;
      font-size: 0.78rem;
    }
    .bubble.assistant pre code.hljs { border-radius: 7px; padding: 0.75rem 1rem; }
    .bubble.assistant :not(pre) > code {
      background: rgba(124, 92, 191, 0.18);
      padding: 0.1em 0.38em;
      border-radius: 4px;
      font-size: 0.85em;
      font-family: 'Fira Code', Consolas, monospace;
    }

    .vrm-credit {
      position: absolute;
      bottom: 8px;
      left: 0; right: 0;
      text-align: center;
      font-size: 0.58rem;
      letter-spacing: 0.08em;
      color: var(--muted);
      opacity: 0.5;
      z-index: 4;
      pointer-events: none;
    }
    .vrm-credit a {
      color: inherit;
      text-decoration: none;
      pointer-events: all;
    }
    .vrm-credit a:hover { opacity: 0.9; color: var(--accent-light); }

    @media (max-width: 620px) {
      .char-col { display: none; }
    }
  </style>
</head>
<body>

<!-- Left: chat -->
<div class="chat-col">
  <header>
    <h1>Evanessia</h1>
    <p class="subtitle">голосовой ассистент</p>
  </header>

  <div class="status" id="status">нажмите микрофон</div>

  <div class="controls">
    <button class="ctrl-btn" id="wakeBtn">⌀ слово-пробуждение</button>
    <button class="ctrl-btn" id="clearBtn">очистить историю</button>
    <button class="ctrl-btn" id="themeBtn">☀ светлая</button>
  </div>

  <div class="bubble-wrap" id="bubbles"></div>

  <div class="input-row">
    <button class="mic-btn" id="micBtn" title="Нажми чтобы говорить">
      <svg viewBox="0 0 24 24"><path d="M12 14a3 3 0 0 0 3-3V5a3 3 0 0 0-6 0v6a3 3 0 0 0 3 3zm5-3a5 5 0 0 1-10 0H5a7 7 0 0 0 6 6.93V20H9v2h6v-2h-2v-2.07A7 7 0 0 0 19 11h-2z"/></svg>
    </button>
    <input class="text-input" id="textInput" type="text" placeholder="Напишите сообщение…" autocomplete="off" />
    <button class="send-btn" id="sendBtn">
      <svg viewBox="0 0 24 24"><path d="M2.01 21 23 12 2.01 3 2 10l15 2-15 2z"/></svg>
    </button>
  </div>
</div>

<!-- Right: full-body character -->
<div class="char-col" id="charCol">
  <canvas id="vrmCanvas"></canvas>
  <div class="model-switcher" id="modelSwitcher"></div>
  <div class="vrm-credit"><a href="https://hub.vroid.com" target="_blank" rel="noopener">Модели: VRoid Hub</a></div>
  <div class="orb-fallback" id="orbFallback">
    <div class="orb-fx">
      <div class="ring"></div>
      <div class="ring"></div>
      <div class="ring"></div>
      <div class="orb-core">
        <svg viewBox="0 0 24 24"><path d="M12 14a3 3 0 0 0 3-3V5a3 3 0 0 0-6 0v6a3 3 0 0 0 3 3zm5-3a5 5 0 0 1-10 0H5a7 7 0 0 0 6 6.93V20H9v2h6v-2h-2v-2.07A7 7 0 0 0 19 11h-2z"/></svg>
      </div>
    </div>
  </div>
</div>

<!-- VRM renderer -->
<script type="module">
  import * as THREE from 'three';
  import { GLTFLoader } from 'three/addons/loaders/GLTFLoader.js';
  import { VRMLoaderPlugin, VRMUtils } from '@pixiv/three-vrm';
  import { VRMAnimationLoaderPlugin, createVRMAnimationClip } from '@pixiv/three-vrm-animation';

  // ── Список моделей — добавь VRM файлы в папку /models/ и перечисли здесь ──
  // Модели взяты с VRoid Hub (hub.vroid.com), имена файлов — ID персонажей.
  // Используются в некоммерческих целях согласно лицензиям авторов.
  const MODELS = [
    { name: 'Персонаж 1', url: './models/character.vrm' },
    { name: 'Персонаж 2', url: './models/3384082866828365030.vrm' },
    { name: 'Персонаж 3', url: './models/9078709946308440306.vrm' },
    { name: 'Персонаж 4', url: './models/2678195447367705405.vrm' },
    { name: 'Персонаж 5', url: './models/3851449306756349825.vrm' },
    { name: 'Персонаж 6', url: './models/6112911262019469915.vrm' },
    { name: 'Персонаж 7', url: './models/716071017220214926.vrm' },
    { name: 'Персонаж 8', url: './models/7919734722097350729.vrm' },
    { name: 'Персонаж 9', url: './models/8658492331848297921.vrm' },
  ];

  const canvas        = document.getElementById('vrmCanvas');
  const charCol       = document.getElementById('charCol');
  const modelSwitcher = document.getElementById('modelSwitcher');

  const W = charCol.clientWidth  || 280;
  const H = charCol.clientHeight || window.innerHeight;

  const renderer = new THREE.WebGLRenderer({ canvas, alpha: true, antialias: true });
  renderer.setSize(W, H);
  renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
  renderer.outputColorSpace = THREE.SRGBColorSpace;

  const scene  = new THREE.Scene();
  const camera = new THREE.PerspectiveCamera(36, W / H, 0.01, 20);
  camera.position.set(0, 0.95, 4.2);
  camera.lookAt(0, 0.85, 0);

  scene.add(new THREE.AmbientLight(0x9988dd, 0.6));
  const key = new THREE.DirectionalLight(0xd0ccff, 1.2);
  key.position.set(0.5, 3, 2.5); scene.add(key);
  const rim = new THREE.DirectionalLight(0x6644aa, 0.45);
  rim.position.set(-2, 2, -1.5); scene.add(rim);
  const fill = new THREE.DirectionalLight(0xaaaacc, 0.3);
  fill.position.set(2, 0.5, 1); scene.add(fill);

  let vrm      = null;
  let mixer    = null;
  let evaState = 'idle';

  // Each state gets a playlist of VRMA animations to rotate through
  const VRMA_SETS = {
    idle:      ['./models/VRMA_06.vrma', './models/VRMA_01.vrma', './models/VRMA_05.vrma'],
    standby:   ['./models/VRMA_06.vrma', './models/VRMA_01.vrma'],
    listening: ['./models/VRMA_02.vrma'],
    thinking:  ['./models/VRMA_01.vrma', './models/VRMA_07.vrma'],
    speaking:  ['./models/VRMA_03.vrma', './models/VRMA_04.vrma', './models/VRMA_01.vrma', './models/VRMA_05.vrma'],
  };
  let allVrmaActions   = {}; // url → AnimationAction
  let stateVrmaIdx     = {}; // state → current index in its playlist
  let currentVrmAction = null;
  let idleRotateTimer  = 0;
  const IDLE_ROTATE_SEC = 12;

  function getVrmaAction(state) {
    const set = VRMA_SETS[state];
    if (!set?.length) return null;
    const idx = (stateVrmaIdx[state] ?? 0) % set.length;
    return allVrmaActions[set[idx]] ?? null;
  }

  function switchVrmaAction(action, duration = 0.9, force = false) {
    if (!mixer || !action) return;
    if (action === currentVrmAction && !force) return;
    action.reset().play();
    if (currentVrmAction && currentVrmAction !== action) currentVrmAction.crossFadeTo(action, duration, true);
    currentVrmAction = action;
  }
  const clock  = new THREE.Clock();

  // Normalized bones — vrm.update() reads these and writes to raw bones.
  // Using raw bones directly gets overwritten by vrm.update(), so we must
  // use normalized bones for any persistent pose changes.
  const nb = {};
  const NB = [
    'hips','spine','chest','upperChest','neck','head',
    'leftShoulder','rightShoulder',
    'leftUpperArm','rightUpperArm',
    'leftLowerArm','rightLowerArm'
  ];

  // A-pose arm offset: lower arms from T-pose horizontal to ~45° down
  // Positive Z lowers the left arm, negative Z lowers the right arm
  const ARM_REST = Math.PI * 0.38; // ≈ 68° down from horizontal

  let blinkTimer = 2, blinkInterval = 3 + Math.random() * 2;
  let blinkVal = 0, blinkDir = 0;
  let mouthPhase   = 0;
  let headTiltCur  = 0, headTiltTgt = 0;
  // Lerped arm values — avoid snapping when state changes
  let curArmLZ = 0, curArmRZ = 0, curArmLX = 0, curArmRX = 0;

  const lerp = (a, b, t) => a + (b - a) * t;

  function setExpr(name, w) {
    if (!vrm?.expressionManager) return;
    try { vrm.expressionManager.setValue(name, Math.max(0, Math.min(1, w))); } catch {}
  }

  // Set a normalized bone's euler rotation (delta FROM identity / T-pose)
  function nb3(name, x = 0, y = 0, z = 0) {
    if (!nb[name]) return;
    nb[name].rotation.set(x, y, z);
  }

  const loader = new GLTFLoader();
  loader.register(p => new VRMLoaderPlugin(p));
  loader.register(p => new VRMAnimationLoaderPlugin(p));

  // Build model selector dropdown
  if (MODELS.length > 1) {
    const sel = document.createElement('select');
    MODELS.forEach((m, i) => {
      const opt = document.createElement('option');
      opt.value = i; opt.textContent = m.name;
      sel.appendChild(opt);
    });
    sel.addEventListener('change', () => loadModel(MODELS[+sel.value].url));
    modelSwitcher.appendChild(sel);
  }

  async function loadModel(url) {
    // Dispose old animation mixer
    if (mixer) { mixer.stopAllAction(); mixer = null; }
    allVrmaActions = {}; stateVrmaIdx = {}; currentVrmAction = null; idleRotateTimer = 0;

    // Unload previous VRM
    if (vrm) {
      scene.remove(vrm.scene);
      vrm.scene.traverse(obj => {
        if (obj.isMesh) {
          obj.geometry?.dispose();
          const mats = Array.isArray(obj.material) ? obj.material : [obj.material];
          mats.forEach(m => m?.dispose());
        }
      });
      vrm = null;
    }
    NB.forEach(n => delete nb[n]);
    canvas.style.opacity = '0';
    curArmLZ = curArmRZ = curArmLX = curArmRX = 0;

    return new Promise((resolve, reject) => {
      loader.load(url,
        async gltf => {
          vrm = gltf.userData.vrm;
          try { VRMUtils.removeUnnecessaryJoints(vrm.scene); } catch {}
          vrm.scene.rotation.y = Math.PI;
          scene.add(vrm.scene);
          NB.forEach(n => {
            const b = vrm.humanoid.getNormalizedBoneNode(n);
            if (b) nb[n] = b;
          });

          // Load all unique VRMA files, then start the current state's animation
          try {
            mixer = new THREE.AnimationMixer(vrm.scene);

            // On animation end: crossfade to next in playlist instead of looping
            mixer.addEventListener('finished', e => {
              if (e.action !== currentVrmAction) return;
              const set = VRMA_SETS[evaState];
              if (!set?.length) return;
              stateVrmaIdx[evaState] = ((stateVrmaIdx[evaState] ?? 0) + 1) % set.length;
              switchVrmaAction(getVrmaAction(evaState), 0.8, true);
            });

            const allUrls = [...new Set(Object.values(VRMA_SETS).flat())];
            for (const url of allUrls) {
              try {
                const gltf = await new Promise((res, rej) => loader.load(url, g => res(g), undefined, rej));
                const anim = gltf.userData.vrmAnimations?.[0];
                if (anim) {
                  const action = mixer.clipAction(createVRMAnimationClip(anim, vrm));
                  action.setLoop(THREE.LoopOnce, 1);
                  action.clampWhenFinished = true;
                  allVrmaActions[url] = action;
                }
              } catch { /* skip missing file */ }
            }
            const startAction = getVrmaAction(evaState) ?? getVrmaAction('idle');
            if (startAction) { startAction.play(); currentVrmAction = startAction; }
          } catch { /* no VRMA, fall back to procedural */ }

          canvas.style.opacity = '1';
          document.getElementById('orbFallback').style.display = 'none';
          resolve(vrm);
        },
        undefined,
        () => { canvas.style.display = 'none'; reject(); }
      );
    });
  }

  // Load first model on start
  loadModel(MODELS[0].url);

  // Discard accumulated time when tab becomes visible again
  document.addEventListener('visibilitychange', () => {
    if (!document.hidden) clock.getDelta();
  });

  window.addEventListener('eva-state', e => {
    evaState = e.detail;
    headTiltTgt = evaState === 'listening' ? 0.09 : 0;
    if (evaState !== 'speaking') { mouthPhase = 0; setExpr('aa', 0); }

    // Pick a random animation from this state's playlist, then crossfade
    if (VRMA_SETS[evaState]) {
      const set = VRMA_SETS[evaState];
      stateVrmaIdx[evaState] = Math.floor(Math.random() * set.length);
    }
    idleRotateTimer = 0;
    switchVrmaAction(getVrmaAction(evaState));
  });

  (function animate() {
    requestAnimationFrame(animate);
    if (!vrm) return;

    const dt = Math.min(clock.getDelta(), 0.05);
    const t  = clock.elapsedTime;

    headTiltCur = lerp(headTiltCur, headTiltTgt, dt * 3.5);

    if (mixer) {
      // ── VRMA mode: animations handle full body, we only add lip sync on top ──
      mixer.update(dt);

      if (evaState === 'speaking') {
        mouthPhase += dt * 7.5;
        setExpr('aa', Math.abs(Math.sin(mouthPhase)) * 0.62);
      }

    } else {
      // ── Procedural fallback (no VRMA files available) ──
      blinkTimer -= dt;
      if (blinkTimer <= 0 && blinkDir === 0) {
        blinkDir = 1; blinkTimer = blinkInterval;
        blinkInterval = 2 + Math.random() * 3.5;
      }
      if (blinkDir ===  1) { blinkVal += dt * 18; if (blinkVal >= 1) { blinkVal = 1; blinkDir = -1; } }
      if (blinkDir === -1) { blinkVal -= dt * 12; if (blinkVal <= 0) { blinkVal = 0; blinkDir =  0; } }
      setExpr('blink', blinkVal);

      let tgtArmLZ, tgtArmRZ, tgtArmLX, tgtArmRX;

      if (evaState === 'idle' || evaState === 'standby') {
        const sw  = Math.sin(t * 0.38) * 0.04;
        const br  = Math.sin(t * 0.9)  * 0.009;
        nb3('hips',       0,                      0, -sw * 0.4);
        nb3('spine',      br * 0.5,               0,  sw * 0.55);
        nb3('chest',      br,                     0,  sw * 0.8);
        nb3('upperChest', br * 0.5,               0,  sw * 0.5);
        nb3('head', Math.sin(t*0.17)*0.025, Math.sin(t*0.22)*0.07, headTiltCur);
        tgtArmLZ =  ARM_REST + Math.sin(t*0.4)*0.03;
        tgtArmRZ = -ARM_REST - Math.sin(t*0.4)*0.03;
        tgtArmLX = 0; tgtArmRX = 0;

      } else if (evaState === 'listening') {
        const br = Math.sin(t * 0.9) * 0.006;
        nb3('spine',      br * 0.5 + 0.03, 0, 0);
        nb3('chest',      br + 0.06,       0, 0);
        nb3('upperChest', br + 0.03,       0, 0);
        nb3('head',       0,               0, headTiltCur);
        tgtArmLZ =  ARM_REST; tgtArmRZ = -ARM_REST;
        tgtArmLX = 0; tgtArmRX = 0;

      } else if (evaState === 'thinking') {
        const nod = Math.sin(t * 1.8) * 0.028;
        nb3('chest', 0.03, 0, 0);
        nb3('head',  0.07 + nod, Math.sin(t*0.5)*0.08, headTiltCur);
        tgtArmLZ =  ARM_REST; tgtArmRZ = -ARM_REST;
        tgtArmLX = 0; tgtArmRX = 0;

      } else { // speaking
        mouthPhase += dt * 7.5;
        setExpr('aa', Math.abs(Math.sin(mouthPhase)) * 0.62);
        const sw  = Math.sin(t * 1.35) * 0.045;
        const fwd = 0.03 + Math.sin(t * 0.85) * 0.015;
        nb3('hips',       0,                     0, -sw * 0.4);
        nb3('spine',      fwd * 0.4,             0,  sw * 0.55);
        nb3('chest',      fwd,                   0,  sw * 0.8);
        nb3('upperChest', fwd * 0.5,             0,  sw * 0.5);
        nb3('head', Math.sin(t*2.1)*0.028, Math.sin(t*1.4)*0.04, headTiltCur);
        tgtArmLZ =  ARM_REST + Math.sin(t*1.6) * 0.05;
        tgtArmRZ = -ARM_REST - Math.sin(t*1.6) * 0.05;
        tgtArmLX =  Math.sin(t*1.6) * 0.1;
        tgtArmRX =  Math.sin(t*1.6 + Math.PI) * 0.1;
      }

      const armSpeed = dt * 4;
      curArmLZ = lerp(curArmLZ, tgtArmLZ, armSpeed);
      curArmRZ = lerp(curArmRZ, tgtArmRZ, armSpeed);
      curArmLX = lerp(curArmLX, tgtArmLX, armSpeed);
      curArmRX = lerp(curArmRX, tgtArmRX, armSpeed);
      nb3('leftUpperArm',  curArmLX, 0, curArmLZ);
      nb3('rightUpperArm', curArmRX, 0, curArmRZ);
    }

    vrm.update(dt);
    renderer.render(scene, camera);
  })();

  window.addEventListener('resize', () => {
    const w = charCol.clientWidth  || 280;
    const h = charCol.clientHeight || window.innerHeight;
    camera.aspect = w / h;
    camera.updateProjectionMatrix();
    renderer.setSize(w, h);
  });
</script>

<script>
  const charCol   = document.getElementById('charCol');
  const micBtn    = document.getElementById('micBtn');
  const statusEl  = document.getElementById('status');
  const bubblesEl = document.getElementById('bubbles');
  const wakeBtn   = document.getElementById('wakeBtn');
  const clearBtn  = document.getElementById('clearBtn');
  const textInput = document.getElementById('textInput');
  const sendBtn   = document.getElementById('sendBtn');

  const STORAGE_KEY = 'evanessia_history';
  const MAX_SAVED   = 40;
  const WAKE_WORDS  = ['эва', 'ева', 'eva', 'эванессия', 'эванессиа', 'evanessia'];

  const SYSTEM_MSG = {
    role: 'system',
    content: 'Ты — Evanessia, умный голосовой ассистент. Отвечай кратко, дружелюбно и по-русски. Избегай длинных перечислений — говори живым языком, как в разговоре.'
  };

  // ── State ────────────────────────────────────────────────────────────────────
  let wakeMode      = false;
  let awaitingQuery = false;
  let isSpeaking    = false;
  let convTimer     = null;
  let recTimer      = null;
  let lastReply     = null;
  let emptyCount    = 0;

  function setCharState(s) {
    charCol.className = 'char-col' + (s ? ' ' + s : '');
    micBtn.className  = 'mic-btn'  + (s ? ' ' + s : '');
    window.dispatchEvent(new CustomEvent('eva-state', { detail: s || 'idle' }));
  }

  // ── History ─────────────────────────────────────────────────────────────────
  let history = [SYSTEM_MSG];

  function loadHistory() {
    try {
      const saved = JSON.parse(localStorage.getItem(STORAGE_KEY) || '[]');
      if (saved.length) {
        history = [SYSTEM_MSG, ...saved];
        saved.forEach(m => addBubble(m.role, m.content, false));
        bubblesEl.scrollTop = bubblesEl.scrollHeight;
      }
    } catch {}
  }

  function saveHistory() {
    const msgs = history.filter(m => m.role !== 'system').slice(-MAX_SAVED);
    localStorage.setItem(STORAGE_KEY, JSON.stringify(msgs));
  }

  function clearHistory() {
    if (!confirm('Очистить историю разговора?')) return;
    history = [SYSTEM_MSG];
    localStorage.removeItem(STORAGE_KEY);
    bubblesEl.innerHTML = '';
  }

  // ── MediaRecorder → Whisper ──────────────────────────────────────────────────
  let isRecording   = false;
  let mediaRecorder = null;
  let audioChunks   = [];
  let micStream     = null;

  async function getMic() {
    if (!micStream) micStream = await navigator.mediaDevices.getUserMedia({ audio: true });
    return micStream;
  }

  async function startRecording() {
    try {
      const stream = await getMic();
      audioChunks  = [];
      const mime   = MediaRecorder.isTypeSupported('audio/webm;codecs=opus')
                     ? 'audio/webm;codecs=opus' : 'audio/webm';
      mediaRecorder = new MediaRecorder(stream, { mimeType: mime });
      mediaRecorder.ondataavailable = e => { if (e.data.size > 0) audioChunks.push(e.data); };
      mediaRecorder.onstop = onRecordingStop;
      mediaRecorder.start();
      isRecording = true;
      setCharState('listening');
      setStatus('запись…', true);
    } catch {
      setStatus('нет доступа к микрофону', false);
    }
  }

  function stopRecording() {
    if (!mediaRecorder || mediaRecorder.state !== 'recording') return;
    clearTimeout(recTimer);
    isRecording = false;
    mediaRecorder.stop();
    setCharState('thinking');
    setStatus('распознаю…', true);
  }

  async function onRecordingStop() {
    const blob   = new Blob(audioChunks, { type: mediaRecorder.mimeType });
    const base64 = await new Promise(resolve => {
      const reader = new FileReader();
      reader.onload = () => resolve(reader.result.split(',')[1]);
      reader.readAsDataURL(blob);
    });

    try {
      const res  = await fetch('/whisper', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ audio: base64, mimeType: mediaRecorder.mimeType }),
      });
      const data = await res.json();
      const text = (data.text || '').trim();

      if (text.length > 1) {
        emptyCount = 0;
        addBubble('user', text);
        await sendToGroq(text);
      } else {
        emptyCount++;
        if (awaitingQuery && emptyCount < 2) {
          setStatus('не расслышала…', true);
          startConversation();
        } else {
          emptyCount = 0;
          endConversation();
        }
      }
    } catch {
      setStatus('ошибка распознавания', false);
      endConversation();
    }
  }

  // ── Mic button ───────────────────────────────────────────────────────────────
  micBtn.addEventListener('click', () => {
    if (wakeMode && !awaitingQuery) return;
    if (isRecording) {
      clearTimeout(recTimer);
      stopRecording();
    } else if (!isSpeaking) {
      startRecording();
    }
  });

  // ── Conversation mode ────────────────────────────────────────────────────────
  function startConversation() {
    awaitingQuery = true;
    clearTimeout(convTimer);
    clearTimeout(recTimer);
    startRecording();
    recTimer  = setTimeout(() => { if (isRecording) stopRecording(); }, 8000);
    convTimer = setTimeout(endConversation, 30000);
  }

  function endConversation() {
    awaitingQuery = false;
    emptyCount    = 0;
    clearTimeout(convTimer);
    clearTimeout(recTimer);
    if (isRecording) stopRecording();
    if (wakeMode) {
      setCharState('standby');
      setStatus('жду «Эва»…', false);
      startWakeListening();
    } else {
      setCharState('');
      setStatus('нажмите микрофон', false);
    }
  }

  // ── Wake word ─────────────────────────────────────────────────────────────────
  const SpeechRec   = window.SpeechRecognition || window.webkitSpeechRecognition;
  const recognition = SpeechRec ? new SpeechRec() : null;
  let isListening   = false;

  if (recognition) {
    recognition.lang            = 'ru-RU';
    recognition.continuous      = false;
    recognition.interimResults  = false;
    recognition.maxAlternatives = 1;
  }

  function startWakeListening() {
    if (!recognition || !wakeMode || awaitingQuery || isRecording || isListening) return;
    try { recognition.start(); } catch {}
  }

  if (recognition) {
    recognition.onstart = () => { isListening = true; };
    recognition.onend   = () => {
      isListening = false;
      if (wakeMode && !awaitingQuery && !isRecording) setTimeout(startWakeListening, 100);
    };
    recognition.onerror = () => {
      isListening = false;
      if (wakeMode && !awaitingQuery && !isRecording) setTimeout(startWakeListening, 600);
    };
    recognition.onresult = async (e) => {
      const text      = e.results[e.resultIndex][0].transcript.trim();
      const lower     = text.toLowerCase();
      const wakeFound = WAKE_WORDS.find(w => lower.includes(w));
      if (!wakeFound) return;
      const idx   = lower.indexOf(wakeFound);
      const query = text.slice(idx + wakeFound.length).trim();
      if (query.length > 1) {
        addBubble('user', query);
        await sendToGroq(query);
      } else {
        setTimeout(startConversation, 300);
      }
    };
  }

  wakeBtn.addEventListener('click', () => {
    wakeMode = !wakeMode;
    wakeBtn.classList.toggle('on', wakeMode);
    wakeBtn.textContent = wakeMode ? '● слово-пробуждение' : '⌀ слово-пробуждение';
    if (wakeMode) {
      setCharState('standby');
      setStatus('жду «Эва»…', false);
      startWakeListening();
    } else {
      if (recognition) try { recognition.stop(); } catch {}
      if (isRecording) stopRecording();
      setCharState('');
      setStatus('нажмите микрофон', false);
    }
  });

  clearBtn.addEventListener('click', clearHistory);

  const themeBtn = document.getElementById('themeBtn');
  const hlTheme  = document.getElementById('hlTheme');
  function applyTheme(light) {
    document.documentElement.dataset.theme = light ? 'light' : '';
    themeBtn.textContent = light ? '☾ тёмная' : '☀ светлая';
    themeBtn.classList.toggle('on', light);
    hlTheme.href = light
      ? 'https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/styles/atom-one-light.min.css'
      : 'https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/styles/atom-one-dark.min.css';
    localStorage.setItem('eva-theme', light ? 'light' : 'dark');
  }
  applyTheme(localStorage.getItem('eva-theme') === 'light');
  themeBtn.addEventListener('click', () => applyTheme(document.documentElement.dataset.theme !== 'light'));

  // ── Groq API ──────────────────────────────────────────────────────────────────
  async function sendToGroq(userText) {
    history.push({ role: 'user', content: userText });
    setCharState('thinking');
    setStatus('думаю…', true);

    try {
      const res   = await fetch('/chat', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ messages: history }),
      });
      const data  = await res.json();
      const reply = data.choices?.[0]?.message?.content ?? 'Не получила ответ.';
      history.push({ role: 'assistant', content: reply });
      saveHistory();
      addBubble('assistant', reply);
      speak(reply);
    } catch {
      setCharState(wakeMode ? 'standby' : '');
      setStatus(wakeMode ? 'жду «Эва»…' : 'ошибка соединения', false);
    }
  }

  // ── Text input ────────────────────────────────────────────────────────────────
  async function handleTextSend() {
    const text = textInput.value.trim();
    if (!text) return;
    textInput.value = '';
    addBubble('user', text);
    await sendToGroq(text);
  }

  sendBtn.addEventListener('click', handleTextSend);
  textInput.addEventListener('keydown', e => {
    if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); handleTextSend(); }
  });

  // ── TTS ───────────────────────────────────────────────────────────────────────
  // ── Голоса Fish Audio — добавляй новые сюда ──────────────────────────────────
  const VOICES = [
    { name: 'Молодая (RU)',  id: '66485766aad041cbbe2ef58b080e33a6' },
    { name: 'Голос 3 (RU)', id: 'ff1ae409865e4c7493db061913d77a79' },
  ];
  let currentVoiceId = VOICES[0].id;

  // Строим селектор голосов под переключателем моделей
  (function buildVoiceSelector() {
    if (VOICES.length < 2) return;
    const switcher = document.getElementById('modelSwitcher');
    const sel = document.createElement('select');
    VOICES.forEach((v, i) => {
      const opt = document.createElement('option');
      opt.value = v.id; opt.textContent = v.name;
      sel.appendChild(opt);
    });
    sel.addEventListener('change', () => { currentVoiceId = sel.value; });
    switcher.appendChild(sel);
  })();

  function onSpeakEnd() {
    isSpeaking = false;
    if (wakeMode) { setCharState('standby'); setTimeout(startConversation, 300); }
    else { setCharState(''); setStatus('нажмите микрофон', false); }
  }

  // Split reply into sentences so we can pipeline TTS requests:
  // fetch sentence N+1 while sentence N is playing → hides latency after the first sentence
  function splitSentences(text) {
    const parts = text.match(/[^.!?]+[.!?]+/g)?.map(s => s.trim()).filter(Boolean);
    return parts && parts.length > 1 ? parts : [text];
  }

  function fetchTtsBlob(chunk) {
    return fetch('/tts', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ text: chunk, voiceId: currentVoiceId }),
    }).then(r => { if (!r.ok) throw new Error('tts'); return r.blob(); });
  }

  function playBlob(blob) {
    return new Promise((resolve, reject) => {
      const url   = URL.createObjectURL(blob);
      const audio = new Audio(url);
      audio.onended = () => { URL.revokeObjectURL(url); resolve(); };
      audio.onerror = () => { URL.revokeObjectURL(url); reject(); };
      audio.play().catch(reject);
    });
  }

  async function speak(text) {
    speechSynthesis.cancel();
    setCharState('speaking');
    setStatus('говорю…', true);
    isSpeaking = true;

    try {
      const sentences = splitSentences(text);
      let nextFetch   = fetchTtsBlob(sentences[0]); // start fetching immediately

      for (let i = 0; i < sentences.length; i++) {
        const blob = await nextFetch;
        // Prefetch next sentence while current one is about to play
        if (i + 1 < sentences.length) nextFetch = fetchTtsBlob(sentences[i + 1]);
        await playBlob(blob);
      }
      onSpeakEnd();
    } catch {
      speakFallback(text);
    }
  }

  // Fallback to browser TTS if Fish Audio fails
  let voices = [];
  const loadVoices = () => { voices = speechSynthesis.getVoices(); };
  loadVoices();
  speechSynthesis.addEventListener('voiceschanged', loadVoices);

  function speakFallback(text) {
    const utt = new SpeechSynthesisUtterance(text);
    utt.lang = 'ru-RU'; utt.rate = 1.0; utt.pitch = 1.1;
    const ruFemale = voices.find(v => v.lang.startsWith('ru') && /female|irina|tatyana|milena|svetlana/i.test(v.name));
    const v = ruFemale || voices.find(v => v.lang.startsWith('ru')) || voices[0];
    if (v) utt.voice = v;
    utt.onend = onSpeakEnd;
    speechSynthesis.speak(utt);
  }

  // ── Helpers ───────────────────────────────────────────────────────────────────
  function setStatus(text, active) {
    statusEl.textContent = text;
    statusEl.className   = 'status' + (active ? ' active' : '');
  }

  function addBubble(role, text, animate = true) {
    const div = document.createElement('div');
    div.className = `bubble ${role}`;
    if (!animate) div.style.animation = 'none';

    if (role === 'assistant') {
      div.innerHTML = marked.parse(text);
      div.querySelectorAll('pre code').forEach(el => hljs.highlightElement(el));
      const btn = document.createElement('button');
      btn.className = 'bubble-replay';
      btn.title = 'Прослушать снова';
      btn.innerHTML = '<svg viewBox="0 0 24 24"><path d="M8 5v14l11-7z"/></svg>';
      btn.addEventListener('click', () => { if (!isSpeaking) speak(text); });
      div.appendChild(btn);
    } else {
      div.textContent = text;
    }

    bubblesEl.appendChild(div);
    bubblesEl.scrollTop = bubblesEl.scrollHeight;
  }

  loadHistory();
</script>
</body>
